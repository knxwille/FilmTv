<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Uyumlu IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --hover: #2563eb;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding-bottom: 10px;
            display: flex;
            justify-content: center; /* Videoyu yatayda ortalar */
        }

        video {
            width: 50%; /* İstediğin boyut */
            max-width: 100%;
            border-radius: 8px;
            background: #000;
            aspect-ratio: 16 / 9;
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            font-size: 16px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
            background: var(--card);
            border-radius: 8px;
            min-height: 200px;
        }

        #playlist li {
            padding: 15px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        .active { border-left: 6px solid var(--accent); background: #1e40af !important; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            video { width: 100%; } /* Mobilde tam ekran olsun diye */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper">
        <video id="video" controls playsinline></video>
    </div>

    <button class="btn" onclick="loadM3U()">Listeyi Yükle</button>
    <input type="text" id="searchInput" class="search-box" placeholder="Kanal ara..." onkeyup="filterPlaylist()">
    <ul id="playlist"></ul>
</div>

<script>
    const video = document.getElementById('video');
    const playlistContainer = document.getElementById('playlist');
    const m3uUrl = 'https://raw.githubusercontent.com/absol12/reptv/refs/heads/main/01.m3u';
    let hls = new Hls();

    async function loadM3U() {
        try {
            // Butona basıldığında listeyi temizle (yüklendiğini anlamak için)
            playlistContainer.innerHTML = '<li>Yükleniyor...</li>';
            
            const response = await fetch(m3uUrl);
            if (!response.ok) throw new Error('Ağ hatası');
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            console.error(err);
            playlistContainer.innerHTML = '<li style="color:red">Hata: Liste çekilemedi. (CORS veya Bağlantı hatası)</li>';
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        playlistContainer.innerHTML = '';
        let currentName = '';

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                currentName = line.split(',').pop();
            } else if (line.startsWith('http')) {
                const li = document.createElement('li');
                li.textContent = currentName || 'Kanal';
                li.onclick = () => playSource(line, li);
                playlistContainer.appendChild(li);
                currentName = '';
            }
        });
    }

    function playSource(url, element) {
        document.querySelectorAll('li').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterPlaylist() {
        const filter = document.getElementById('searchInput').value.toLowerCase();
        const items = playlistContainer.getElementsByTagName('li');
        for (let i = 0; i < items.length; i++) {
            const text = items[i].textContent.toLowerCase();
            items[i].classList.toggle('hidden', !text.includes(filter));
        }
    }
</script>

</body>
</html>
