<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Uyumlu IPTV Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --hover: #2563eb;
            --text: #f8fafc;
            --success: #10b981;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding-bottom: 10px;
            display: flex;
            justify-content: center;
        }

        .video-container {
            width: 50%; 
            max-width: 100%;
        }

        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
        }

        .source-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 5px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            font-size: 16px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-green { background: var(--success); }
        .btn:hover { background: var(--hover); }

        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
            background: var(--card);
            border-radius: 8px;
            min-height: 200px;
        }

        #playlist li {
            padding: 15px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        .active { border-left: 6px solid var(--accent); background: #1e40af !important; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .video-container { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper">
        <div class="video-container">
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        </div>
    </div>

    <div class="source-selector">
        <button class="btn btn-green" onclick="loadM3U('https://iptv-org.github.io/iptv/countries/tr.m3u')">🇹🇷 Türkiye</button>
        <button class="btn btn-green" onclick="loadM3U('https://iptv-org.github.io/iptv/languages/eng.m3u')">🇬🇧 İngilizce</button>
        <button class="btn btn-green" onclick="loadM3U('https://iptv-org.github.io/iptv/categories/movies.m3u')">🎬 Filmler</button>
        <button class="btn" onclick="openFullscreen()">⛶ Tam Ekran</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Kanal ara..." onkeyup="filterPlaylist()">
    <ul id="playlist">
        <li style="text-align: center; color: #94a3b8;">Lütfen yukarıdan bir liste seçin.</li>
    </ul>
</div>

<script>
    const playlistContainer = document.getElementById('playlist');
    let player;

    // Sayfa yüklendiğinde player'ı başlat
    document.addEventListener('DOMContentLoaded', function() {
        player = videojs('my-video', {
            fluid: true,
            responsive: true
        });
    });

    function openFullscreen() {
        if (player) {
            if (!player.isFullscreen()) {
                player.requestFullscreen();
            } else {
                player.exitFullscreen();
            }
        }
    }

    async function loadM3U(url) {
        try {
            playlistContainer.innerHTML = '<li style="text-align:center;">Liste yükleniyor...</li>';
            
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP Hata: ${response.status}`);
            
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            console.error("Yükleme hatası:", err);
            playlistContainer.innerHTML = `<li style="color:#f87171; padding: 20px;">
                <b>Hata:</b> Liste yüklenemedi. <br>
                <small>İnternet bağlantınızı veya kaynağı kontrol edin.</small>
            </li>`;
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        playlistContainer.innerHTML = '';
        let currentName = '';
        let foundChannels = 0;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF')) {
                const nameParts = line.split(',');
                currentName = nameParts[nameParts.length - 1];
            } else if (line.startsWith('http')) {
                const li = document.createElement('li');
                li.textContent = currentName || 'Bilinmeyen Kanal';
                const currentUrl = line;
                li.onclick = () => playSource(currentUrl, li);
                playlistContainer.appendChild(li);
                currentName = '';
                foundChannels++;
            }
        }

        if (foundChannels === 0) {
            playlistContainer.innerHTML = '<li style="padding:20px; text-align:center;">Kanal bulunamadı.</li>';
        }
    }

    function playSource(url, element) {
        const listItems = document.querySelectorAll('#playlist li');
        listItems.forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        let type = 'application/x-mpegURL'; // Varsayılan HLS
        if (url.endsWith('.mp4')) type = 'video/mp4';
        if (url.endsWith('.mpd')) type = 'application/dash+xml';

        player.src({ src: url, type: type });
        player.play().catch(e => console.warn("Otomatik oynatma engellendi:", e));
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterPlaylist() {
        const filter = document.getElementById('searchInput').value.toLowerCase();
        const items = playlistContainer.getElementsByTagName('li');
        for (let i = 0; i < items.length; i++) {
            const text = items[i].textContent.toLowerCase();
            if(items[i].onclick) {
                items[i].classList.toggle('hidden', !text.includes(filter));
            }
        }
    }
</script>

</body>
</html>
