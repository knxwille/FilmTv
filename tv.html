<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#3b82f6;
    --danger:#ef4444;
    --text:#f8fafc;
}

body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container {
    max-width:900px;
    margin:auto;
    padding:10px;
}

/* VIDEO */
.video-container {
    position:sticky;
    top:0;
    z-index:100;
    background:var(--bg);
    display:flex;
    justify-content:center;
    padding-bottom: 5px;
}

.video-box {
    width:640px; /* 320px %15 büyütülmüş hali */
    aspect-ratio:16/9;
    background:black;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.video-js {
    position:absolute !important;
    inset:0;
    width:100% !important;
    height:100% !important;
}

/* BUTTON STICKY ALANI */
.sticky-controls {
    position: sticky;
    top: 215px; /* Video + padding payı */
    z-index: 99;
    background: var(--bg);
    padding: 5px 0;
}

/* BUTTONS */
.btn {
    width:100%;
    margin:5px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-weight: bold;
}

.btn-fs {
    background: var(--danger); /* Tam ekran butonu farklı renkte olsun */
}

/* SEARCH */
.search-box {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    background:var(--card);
    color:white;
}

/* CATEGORY & CHANNEL */
.kategori-header {
    padding:12px;
    cursor:pointer;
    font-weight:bold;
    border-bottom:1px solid #334155;
}
.kategori-list { display:none; background:var(--card); }
.kategori-list.open { display:block; }
.channel-item { display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #334155; cursor:pointer; }
.channel-logo { width:30px; height:30px; object-fit:contain; background:black; }
</style>
</head>

<body>

<div class="container">

<div class="video-container">
  <div class="video-box">
    <video id="player" class="video-js vjs-big-play-centered" controls playsinline></video>
  </div>
</div>

<div class="sticky-controls">
    <button class="btn btn-fs" onclick="toggleFullscreen()">📺 Tam Ekran Yap</button>

    <button class="btn" onclick="loadM3U('https://raw.githubusercontent.com/rideordie16/tv/main/tv2.m3u')">Türkiye</button>
    <button class="btn" onclick="loadM3U('turkiye2.m3u')">Türkiye</button>
    <button class="btn" onclick="loadM3U('spor.m3u')">Türkiye</button>
   </div>

<input id="search" class="search-box" placeholder="Ara..." oninput="filterChannels()">

<ul id="playlist"></ul>

</div>

<script>
let player = videojs('player',{fluid:false,aspectRatio:'16:9'});
const playlist = document.getElementById('playlist');

/* FULLSCREEN FONKSİYONU */
function toggleFullscreen(){
    if(!player.isFullscreen()) {
        player.requestFullscreen();
    } else {
        player.exitFullscreen();
    }
}

/* LOAD M3U */
async function loadM3U(url){
    playlist.innerHTML="Yükleniyor...";
    try {
        let res = await fetch(url);
        let text = await res.text();
        parseM3U(text);
    } catch(e) {
        playlist.innerHTML="Hata: Liste yüklenemedi. CORS sorunu olabilir.";
    }
}

function parseM3U(data){
    let lines=data.split('\n');
    let cats={};
    let name="",group="Diğer",logo="";

    lines.forEach(l=>{
        l=l.trim();
        if(l.startsWith("#EXTINF")){
            name=l.split(",").pop();
            let g=l.match(/group-title="([^"]+)"/);
            group=g?g[1]:"Diğer";
            let lg=l.match(/tvg-logo="([^"]+)"/);
            logo=lg?lg[1]:"";
        }
        else if(l.startsWith("http")){
            if(!cats[group]) cats[group]=[];
            cats[group].push({name,url:l,logo});
        }
    });
    render(cats);
}

function render(cats){
    playlist.innerHTML="";
    Object.keys(cats).forEach(cat=>{
        let header=document.createElement("li");
        header.textContent="📂 "+cat;
        header.className="kategori-header";
        let list=document.createElement("ul");
        list.className="kategori-list open";
        header.onclick=()=>list.classList.toggle("open");

        cats[cat].forEach(ch=>{
            let li=document.createElement("li");
            li.className="channel-item";
            let img=document.createElement("img");
            img.className="channel-logo";
            img.src=ch.logo || "";
            img.onerror=()=>img.style.display="none";
            let span=document.createElement("span");
            span.textContent=ch.name;
            li.appendChild(img);
            li.appendChild(span);
            li.onclick=(e)=>{
                e.stopPropagation();
                player.src({src:ch.url,type:"application/x-mpegURL"});
                player.play();
            };
            list.appendChild(li);
        });
        playlist.appendChild(header);
        playlist.appendChild(list);
    });
}

function filterChannels(){
    let q=document.getElementById('search').value.toLocaleLowerCase('tr');
    document.querySelectorAll('.channel-item').forEach(li=>{
        let text = li.innerText.toLocaleLowerCase('tr');
        li.style.display = text.includes(q) ? "" : "none";
    });
}
</script>

</body>
</html>
