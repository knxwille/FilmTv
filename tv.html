<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Uyumlu IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --hover: #2563eb;
            --text: #f8fafc;
        }

        /* Tüm elemanlar için padding ve border'ı genişliğe dahil et */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Video alanı ortalama ve yapışkan özellikler */
        .video-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding-bottom: 10px;
            display: flex; /* İçindeki videoyu ortalamak için */
            justify-content: center; /* Yatayda ortalar */
        }

        video {
            width: 50%; /* İstediğin sabit %50 genişlik */
            max-width: 100%; /* Ekran dışına taşmayı kesin olarak engeller */
            border-radius: 8px;
            background: #000;
            aspect-ratio: 16 / 9;
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            font-size: 16px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }

        .btn:hover { background: var(--hover); }

        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
            background: var(--card);
            border-radius: 8px;
        }

        #playlist li {
            padding: 15px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #playlist li:active { background: #334155; }
        .active { border-left: 6px solid var(--accent); background: #1e40af !important; }

        .hidden { display: none !important; }

        /* Mobil cihazlarda videonun çok küçük görünmemesi için ayar */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .btn { width: 100%; }
            video { width: 100%; } /* Mobilde tam genişlik daha iyi bir deneyim sunar */
        }

        @media (min-width: 769px) {
            body { padding: 40px; }
            .btn { width: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper">
        <video id="video" controls playsinline></video>
    </div>

    <button class="btn" onclick="loadM3U()">Çalma listesini Yükle/Güncelle</button>

    <input type="text" id="searchInput" class="search-box" placeholder="Kanal ara..." onkeyup="filterPlaylist()">

    <ul id="playlist"></ul>
</div>
