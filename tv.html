<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Uyumlu IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --hover: #2563eb;
            --text: #f8fafc;
            --success: #10b981;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding-bottom: 10px;
            display: flex;
            justify-content: center;
        }

        video {
            width: 50%;
            max-width: 100%;
            border-radius: 8px;
            background: #000;
            aspect-ratio: 16 / 9;
            display: block;
        }

        /* Buton Grubu Stilleri */
        .source-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 5px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            font-size: 16px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-green { background: var(--success); }
        .btn-green:hover { background: #059669; }
        .btn:hover { background: var(--hover); }

        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
            background: var(--card);
            border-radius: 8px;
            min-height: 200px;
        }

        #playlist li {
            padding: 15px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        .active { border-left: 6px solid var(--accent); background: #1e40af !important; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            video { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper">
        <video id="video" controls playsinline></video>
    </div>

    <div class="source-selector">
        <button class="btn btn-green" onclick="loadM3U('https://iptv-org.github.io/iptv/countries/tr.m3u')">🇹🇷 Türkiye</button>
        <button class="btn btn-green" onclick="loadM3U('https://iptv-org.github.io/iptv/languages/eng.m3u')">🇬🇧 İngilizce</button>
        <button class="btn btn-green" onclick="loadM3U('https://iptv-org.github.io/iptv/categories/movies.m3u')">🎬 Filmler</button>
        <button class="btn" onclick="openFullscreen()">⛶ Tam Ekran</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Kanal ara..." onkeyup="filterPlaylist()">
    <ul id="playlist">
        <li style="text-align: center; color: #94a3b8;">Lütfen yukarıdan bir liste seçin.</li>
    </ul>
</div>

<script>
    const video = document.getElementById('video');
    const playlistContainer = document.getElementById('playlist');
    let hls = new Hls();

    function openFullscreen() {
        if (video.requestFullscreen) { video.requestFullscreen(); }
        else if (video.webkitRequestFullscreen) { video.webkitRequestFullscreen(); }
        else if (video.msRequestFullscreen) { video.msRequestFullscreen(); }
    }

    async function loadM3U(url) {
        try {
            playlistContainer.innerHTML = '<li>Liste yükleniyor, lütfen bekleyin...</li>';
            
            const response = await fetch(url, { cache: "no-store" });
            
            if (!response.ok) throw new Error(`Hata: ${response.status}`);
            
            const data = await response.text();
            if (data.trim().length === 0) throw new Error("Liste boş.");

            parseM3U(data);
        } catch (err) {
            console.error("Yükleme Hatası:", err);
            playlistContainer.innerHTML = `<li style="color:#f87171; padding: 20px;">
                <b>Hata:</b> Liste yüklenemedi.<br>
                <small>${err.message}</small>
            </li>`;
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        playlistContainer.innerHTML = '';
        let currentName = '';
        let foundChannels = 0;

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                // İsim alma mantığını geliştirdik
                const nameParts = line.split(',');
                currentName = nameParts[nameParts.length - 1];
            } else if (line.startsWith('http')) {
                const li = document.createElement('li');
                li.textContent = currentName || 'Bilinmeyen Kanal';
                const currentUrl = line;
                li.onclick = () => playSource(currentUrl, li);
                playlistContainer.appendChild(li);
                currentName = '';
                foundChannels++;
            }
        });

        if (foundChannels === 0) {
            playlistContainer.innerHTML = '<li style="padding:20px;">Kanal bulunamadı.</li>';
        }
    }

    function playSource(url, element) {
        document.querySelectorAll('li').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => {}));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play().catch(e => {});
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterPlaylist() {
        const filter = document.getElementById('searchInput').value.toLowerCase();
        const items = playlistContainer.getElementsByTagName('li');
        for (let i = 0; i < items.length; i++) {
            const text = items[i].textContent.toLowerCase();
            if(items[i].onclick) { // Sadece kanal satırlarını filtrele
                items[i].classList.toggle('hidden', !text.includes(filter));
            }
        }
    }
</script>

</body>
</html>
