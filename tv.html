<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player (Proxy Mode)</title>

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        .container { max-width: 800px; margin: auto; padding: 10px; }

        .video-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding-bottom: 15px;
            text-align: center;
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .video-js { width: 100% !important; height: 100% !important; }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-clear { background: #475569; }

        .search-box {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            box-sizing: border-box;
        }

        #playlist { list-style: none; padding: 0; }

        .kategori-header {
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            background: #1e293b;
            margin-top: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        .kategori-list { display: none; list-style: none; padding: 0; background: #111827; }
        .kategori-list.open { display: block; }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
        }

        .channel-item:hover { background: #334155; }

        .channel-logo { width: 30px; height: 30px; object-fit: contain; }
        
        .loading { padding: 20px; text-align: center; color: var(--accent); }
        .error { padding: 20px; text-align: center; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="video-container">
        <div class="video-box">
            <video id="player" class="video-js vjs-big-play-centered" controls playsinline preload="auto"></video>
        </div>
        <p id="current-chan" style="margin-top:10px; font-size:14px; color:var(--accent)">Kanal seçilmedi</p>
    </div>

    <div class="button-grid">
        <button class="btn" onclick="fetchWithProxy('https://iptv-org.github.io/iptv/countries/tr.m3u')">🇹🇷 Türkiye</button>
        <button class="btn" onclick="fetchWithProxy('https://iptv-org.github.io/iptv/countries/us.m3u')">🇺🇸 Amerika</button>
        <button class="btn" onclick="fetchWithProxy('https://iptv-org.github.io/iptv/categories/movies.m3u')">🎬 Filmler</button>
        <button class="btn btn-clear" onclick="location.reload()">🔄 Sayfayı Yenile</button>
    </div>

    <input id="search" class="search-box" placeholder="Kanal ara..." oninput="filterChannels()">

    <div id="status"></div>
    <ul id="playlist"></ul>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('player', { fluid: true });
    const playlistElement = document.getElementById('playlist');
    const statusElement = document.getElementById('status');

    // PROXY FONKSİYONU
    async function fetchWithProxy(targetUrl) {
        playlistElement.innerHTML = "";
        statusElement.innerHTML = "<div class='loading'>⌛ Proxy üzerinden liste indiriliyor...</div>";

        // Allorigins Proxy kullanımı (CORS çözümüdür)
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Proxy yanıt vermedi.');
            
            const data = await response.text();
            statusElement.innerHTML = "";
            parseM3U(data);
        } catch (error) {
            statusElement.innerHTML = `<div class='error'>❌ Hata: ${error.message}<br><small>Proxy yoğun olabilir, lütfen tekrar deneyin.</small
