<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="utf-8">
  <title>Dinamik TV Menüsü</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* KAPSAYICI: Butonları hizalayan ana kutu */
    .button-container {
      display: flex;
      flex-direction: column; /* Alt alta diz */
      gap: 15px;              /* Butonlar arası boşluk */
      
      /* KRİTİK AYARLAR: */
      align-items: stretch;    /* İçindeki tüm elemanları en genişine göre yayar */
      min-width: 300px;        /* Çok dar ekranlarda çok küçük kalmasın */
      max-width: 80vw;         /* Ekranın %80'inden fazla genişlemesin */
    }

    .button-18 {
      background-color: #0A66C2;
      border: 4px solid transparent;
      border-radius: 12px;     /* TV'de daha modern duran hafif köşe */
      color: #ffffff;
      cursor: pointer;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 15px 30px;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease-in-out;
      outline: none;
      
      /* Metin çok çok uzunsa alt satıra geçmesin ama butonun içinde kalsın */
      white-space: normal; 
      word-wrap: break-word;
    }

    /* TV FOCUS EFEKTİ */
    .button-18:focus, 
    .button-18:hover {
      background-color: #ffffff;
      color: #0A66C2;
      border: 4px solid #ffffff;
      transform: scale(1.05); /* Diğer butonların üzerine binmemesi için hafif büyüme */
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    .button-18:active {
      background-color: #d1d1d1;
    }
  </style>
</head>

<body>
<h1>.:: SEÇ İZLE ! ::. </h1>
  <div class="button-container">
    <a href="https://www.hdfilmcehennemi.nl/" class="button-18">hdfilmcehennemi</a>
    <a href="https://www.hdfilmizle.to/" class="button-18">hdfilmizle</a>
    <a href="https://zeusdizi28.com/" class="button-18">zeusdizi28</a>
    <a href="https://jetfilmizle.net/" class="button-18">jetfilmizle</a>
    <a href="https://filmmakinesi.to/" class="button-18">filmmakinesi</a>
    <a href="https://famelack.com/tv/tr" class="button-18">Tv İzle</a>

    </div>
  <script>
    // TV kumandası OK/Enter tuşu desteği
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 13) {
        const focused = document.activeElement;
        if (focused && focused.classList.contains('button-18')) {
          focused.click();
        }
      }
    });
  </script>

</body>
</html>
